<!DOCTYPE html>
<html>

<head>

  <title>Day 4 Landing Page</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background-color: #f5f5f5;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background-color: white;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: darkblue;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-size: 18px;
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px;
    }

    .hero-text {
      width: 50%;
    }

    .hero-text h1 {
      font-size: 50px;
      color: darkblue;
    }

    .hero-text p {
      font-size: 22px;
      color: #444;
    }

    .hero-text button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background-color: darkblue;
      color: white;
      cursor: pointer;
    }

    .hero-image img {
      width: 400px;
      border-radius: 20px;
    }

  </style>

</head>

<body>

  <div class="navbar">

    <div class="logo">
      Swaralaya
    </div>

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>

  </div>

  <div class="hero">

    <div class="hero-text">

      <h1>Build Beautiful Websites 🎵</h1>

      <p>
        Learning frontend development step by step during internship.
      </p>

      <button>
        Get Started
      </button>

    </div>

    <div class="hero-image">

      <img
        src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=500"
      />

    </div>

  </div>

</body>

</html>
